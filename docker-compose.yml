services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ac-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL}
      - SITE_URL=${SITE_URL}
      - BLOG_ADMIN_KEY=${BLOG_ADMIN_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    volumes:
      - ac-data:/app/data
      - ac-blog:/app/content/blog
      - ac-drip:/app/content/drip
      - ac-proposals:/app/content/proposals

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ac-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  ac-data:
  ac-blog:
  ac-drip:
  ac-proposals:
