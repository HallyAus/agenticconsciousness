<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Quote — Competitors</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; bottom: 60px; right: -10px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 220px; color: rgba(255, 61, 0, 0.06); line-height: 1; pointer-events: none; text-transform: uppercase; }
.top-bar { position: absolute; top: 40px; left: 40px; right: 40px; height: 2px; background: #ff3d00; }
.bottom-bar { position: absolute; bottom: 40px; left: 40px; right: 40px; height: 2px; background: #ff3d00; }
.left-bar { position: absolute; top: 40px; left: 40px; width: 2px; height: 200px; background: #ff3d00; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 120px; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 50px; }
.quote { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 58px; line-height: 1.15; color: #ffffff; }
.quote em { font-style: normal; color: #ff3d00; }
.footer { position: absolute; bottom: 70px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-text">NOW</div>
<div class="top-bar"></div>
<div class="bottom-bar"></div>
<div class="left-bar"></div>
<div class="content">
<div class="label">// Wake Up Call</div>
<div class="quote">Your competitors aren't waiting for <em>permission</em> to use AI.</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
