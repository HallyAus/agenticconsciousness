<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Quote — Automate</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Space Mono', monospace; font-weight: 400; font-size: 180px; color: rgba(255, 255, 255, 0.06); line-height: 1; pointer-events: none; text-transform: uppercase; white-space: nowrap; }
.grid-line-h1 { position: absolute; top: 33.33%; left: 0; width: 100%; height: 1px; background: rgba(255, 61, 0, 0.15); }
.grid-line-h2 { position: absolute; top: 66.66%; left: 0; width: 100%; height: 1px; background: rgba(255, 61, 0, 0.15); }
.grid-line-v1 { position: absolute; left: 33.33%; top: 0; width: 1px; height: 100%; background: rgba(255, 61, 0, 0.15); }
.corner-tl { position: absolute; top: 40px; left: 40px; width: 60px; height: 60px; border-top: 2px solid #ff3d00; border-left: 2px solid #ff3d00; }
.corner-br { position: absolute; bottom: 40px; right: 40px; width: 60px; height: 60px; border-bottom: 2px solid #ff3d00; border-right: 2px solid #ff3d00; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 100px; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 50px; }
.quote { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 60px; line-height: 1.15; color: #ffffff; max-width: 800px; }
.quote em { font-style: normal; color: #ff3d00; }
.footer { position: absolute; bottom: 60px; left: 100px; right: 100px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-text">2x</div>
<div class="grid-line-h1"></div>
<div class="grid-line-h2"></div>
<div class="grid-line-v1"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="content">
<div class="label">// Rule of Two</div>
<div class="quote">If you're doing it more than twice, <em>automate it.</em></div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
