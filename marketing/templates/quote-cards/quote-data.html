<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Quote — Data</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #ffffff; color: #0a0a0a; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-number { position: absolute; top: -60px; left: -30px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 500px; color: rgba(10, 10, 10, 0.06); line-height: 1; pointer-events: none; }
.red-block { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: #ff3d00; }
.side-stripe { position: absolute; top: 0; right: 80px; width: 2px; height: 100%; background: rgba(10, 10, 10, 0.1); }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px 120px; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 40px; }
.accent-line { width: 60px; height: 2px; background: #ff3d00; margin-bottom: 50px; }
.quote { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 62px; line-height: 1.1; color: #0a0a0a; }
.quote em { font-style: normal; color: #ff3d00; }
.footer { position: absolute; bottom: 60px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #0a0a0a; }
.logo span { color: #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(10, 10, 10, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-number">03</div>
<div class="red-block"></div>
<div class="side-stripe"></div>
<div class="content">
<div class="label">// Truth Bomb</div>
<div class="accent-line"></div>
<div class="quote">Data without action is just <em>expensive storage.</em></div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
