<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Quote — Speed</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-40 { position: absolute; top: 80px; left: -20px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 350px; color: rgba(255, 255, 255, 0.06); line-height: 1; pointer-events: none; }
.ghost-4 { position: absolute; bottom: 80px; right: 40px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 350px; color: rgba(255, 61, 0, 0.08); line-height: 1; pointer-events: none; }
.progress-bar-bg { position: absolute; top: 50%; left: 80px; right: 80px; height: 4px; background: rgba(255, 255, 255, 0.1); }
.progress-bar-fill { position: absolute; top: 50%; left: 80px; width: 120px; height: 4px; background: #ff3d00; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 50px; }
.quote { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 64px; line-height: 1.1; color: #ffffff; }
.quote em { font-style: normal; color: #ff3d00; }
.stat-row { display: flex; gap: 60px; margin-top: 50px; }
.stat { display: flex; flex-direction: column; }
.stat-number { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 48px; color: #ff3d00; }
.stat-label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); margin-top: 4px; }
.footer { position: absolute; bottom: 60px; left: 100px; right: 100px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-40">40</div>
<div class="ghost-4">4</div>
<div class="content">
<div class="label">// 10x Faster</div>
<div class="quote">40 hours of work. <em>4 hours</em> with AI. Same quality.</div>
<div class="stat-row">
<div class="stat">
<div class="stat-number">90%</div>
<div class="stat-label">Time Saved</div>
</div>
<div class="stat">
<div class="stat-number">100%</div>
<div class="stat-label">Quality Kept</div>
</div>
</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
