<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Quote — ROI</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #ff3d00; color: #0a0a0a; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; top: -30px; right: -20px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 300px; color: rgba(10, 10, 10, 0.06); line-height: 1; pointer-events: none; text-transform: uppercase; }
.border-frame { position: absolute; top: 40px; left: 40px; right: 40px; bottom: 40px; border: 2px solid #0a0a0a; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px 120px; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #0a0a0a; margin-bottom: 40px; opacity: 0.7; }
.accent-line { width: 80px; height: 2px; background: #0a0a0a; margin-bottom: 50px; }
.quote { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 56px; line-height: 1.15; color: #0a0a0a; }
.quote em { font-style: normal; color: #ffffff; }
.footer { position: absolute; bottom: 60px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #0a0a0a; }
.logo span { color: #ffffff; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(10, 10, 10, 0.6); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-text">ROI</div>
<div class="border-frame"></div>
<div class="content">
<div class="label">// The Real Question</div>
<div class="accent-line"></div>
<div class="quote">The question isn't can you afford AI. It's can you <em>afford not to.</em></div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
