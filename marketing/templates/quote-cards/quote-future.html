<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Quote — Future</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; bottom: -20px; left: -10px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 200px; color: rgba(255, 255, 255, 0.06); line-height: 1; pointer-events: none; text-transform: uppercase; letter-spacing: -8px; }
.border-top { position: absolute; top: 40px; left: 40px; right: 40px; height: 2px; background: #ff3d00; }
.border-bottom { position: absolute; bottom: 40px; left: 40px; right: 40px; height: 2px; background: #ff3d00; }
.border-left { position: absolute; top: 40px; left: 40px; width: 2px; height: calc(100% - 80px); background: rgba(255, 61, 0, 0.3); }
.border-right { position: absolute; top: 40px; right: 40px; width: 2px; height: calc(100% - 80px); background: rgba(255, 61, 0, 0.3); }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px 120px; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 40px; }
.accent-line { width: 80px; height: 2px; background: #ff3d00; margin-bottom: 50px; }
.quote { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 56px; line-height: 1.15; color: #ffffff; }
.quote em { font-style: normal; color: #ff3d00; }
.footer { position: absolute; bottom: 65px; left: 120px; right: 120px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-text">FUTURE</div>
<div class="border-top"></div>
<div class="border-bottom"></div>
<div class="border-left"></div>
<div class="border-right"></div>
<div class="content">
<div class="label">// Perspective</div>
<div class="accent-line"></div>
<div class="quote">The future isn't AI replacing jobs. It's AI replacing <em>tasks.</em></div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
