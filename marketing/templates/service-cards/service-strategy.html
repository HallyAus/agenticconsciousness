<!DOCTYPE html>
<html lang="en">
<head>

<title>AC_ Service — Strategy & Workshops</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-number { position: absolute; top: -60px; right: -20px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 500px; color: rgba(255, 255, 255, 0.04); line-height: 1; pointer-events: none; }
.red-top { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #ff3d00; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 100px; }
.top-section { display: flex; flex-direction: column; }
.service-number { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 30px; }
.service-icon { width: 60px; height: 60px; border: 2px solid #ff3d00; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; }
.service-icon span { font-family: 'Space Mono', monospace; font-size: 24px; color: #ff3d00; }
.service-title { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 56px; line-height: 1.1; color: #ffffff; margin-bottom: 30px; }
.service-title em { font-style: normal; color: #ff3d00; }
.accent-line { width: 80px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.service-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; line-height: 1.6; color: rgba(255, 255, 255, 0.7); max-width: 700px; }
.features { display: flex; flex-direction: column; gap: 12px; margin-top: 40px; }
.feature { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.5); padding-left: 20px; border-left: 2px solid #ff3d00; }
.footer { display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-number">01</div>
<div class="red-top"></div>
<div class="content">
<div class="top-section">

<div class="service-title">Strategy <em>&</em> Workshops</div>
<div class="accent-line"></div>
<div class="service-desc">Map your AI readiness. Identify high-impact opportunities. Build a practical roadmap your team can actually execute.</div>
<div class="features">
<div class="feature">AI Readiness Audit</div>
<div class="feature">Opportunity Mapping</div>
<div class="feature">Team Workshops</div>
<div class="feature">Implementation Roadmap</div>
</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</div>
