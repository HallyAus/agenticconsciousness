<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Service — Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1200px; height: 628px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 200px; color: rgba(255, 255, 255, 0.04); line-height: 1; pointer-events: none; white-space: nowrap; letter-spacing: -5px; }
.top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
.header { position: absolute; top: 40px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 24px; color: #ffffff; }
.logo span { color: #ff3d00; }
.headline { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #ff3d00; }
.services { position: absolute; top: 120px; left: 60px; right: 60px; bottom: 80px; display: flex; gap: 2px; }
.service { flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 30px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
.service:hover { border-color: #ff3d00; }
.service-num { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #ff3d00; margin-bottom: 20px; }
.service-name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 26px; line-height: 1.15; color: #ffffff; margin-bottom: 16px; }
.service-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 14px; line-height: 1.5; color: rgba(255, 255, 255, 0.5); }
.service-accent { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #ff3d00; }
.footer { position: absolute; bottom: 25px; left: 60px; right: 60px; display: flex; justify-content: center; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-text">SERVICES</div>
<div class="top-bar"></div>
<div class="header">
<div class="logo">AC<span>_</span></div>
<div class="headline">// What We Do</div>
</div>
<div class="services">
<div class="service">
<div>
<div class="service-num">01</div>
<div class="service-name">Strategy & Workshops</div>
<div class="service-desc">AI readiness audits, opportunity mapping, and team training.</div>
</div>
<div class="service-accent"></div>
</div>
<div class="service">
<div>
<div class="service-num">02</div>
<div class="service-name">Tool Implementation</div>
<div class="service-desc">Deploy AI tools that integrate with your existing systems.</div>
</div>
<div class="service-accent"></div>
</div>
<div class="service">
<div>
<div class="service-num">03</div>
<div class="service-name">Automation & Agents</div>
<div class="service-desc">Build autonomous AI agents for 24/7 operations.</div>
</div>
<div class="service-accent"></div>
</div>
</div>
<div class="footer">
<div class="url">agenticconsciousness.com.au</div>
</div>
