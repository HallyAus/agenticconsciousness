<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Tool — Invoice Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-icon { position: absolute; top: 50%; right: -40px; transform: translateY(-50%); font-family: 'Space Mono', monospace; font-weight: 400; font-size: 400px; color: rgba(255, 255, 255, 0.04); line-height: 1; pointer-events: none; }
.border-left { position: absolute; top: 40px; left: 40px; width: 2px; height: calc(100% - 80px); background: #ff3d00; }
.border-bottom { position: absolute; bottom: 40px; left: 40px; right: 40px; height: 2px; background: rgba(255, 61, 0, 0.3); }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px 100px 100px 120px; }
.badge { display: inline-block; font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #ff3d00; border: 1px solid #ff3d00; padding: 8px 16px; margin-bottom: 40px; width: fit-content; }
.tool-name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 64px; line-height: 1.05; color: #ffffff; margin-bottom: 30px; }
.tool-name em { font-style: normal; color: #ff3d00; }
.accent-line { width: 60px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.tool-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; line-height: 1.6; color: rgba(255, 255, 255, 0.6); max-width: 650px; margin-bottom: 40px; }
.stats { display: flex; gap: 50px; }
.stat-value { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 36px; color: #ff3d00; }
.stat-label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.4); margin-top: 4px; }
.footer { position: absolute; bottom: 60px; left: 120px; right: 100px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.cta { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #ff3d00; }
</style>
</head>
<body>
<div class="ghost-icon">$</div>
<div class="border-left"></div>
<div class="border-bottom"></div>
<div class="content">
<div class="badge">Free AI Tool</div>
<div class="tool-name">Invoice <em>Scanner</em></div>
<div class="accent-line"></div>
<div class="tool-desc">Upload any invoice. Get structured data, line items, and totals extracted in seconds. No signup required.</div>
<div class="stats">
<div class="stat">
<div class="stat-value">&lt;5s</div>
<div class="stat-label">Processing</div>
</div>
<div class="stat">
<div class="stat-value">98%</div>
<div class="stat-label">Accuracy</div>
</div>
</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="cta">Try Free &rarr; agenticconsciousness.com.au</div>
</div>
</body>
</html>
