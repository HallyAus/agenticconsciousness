<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Tool — Competitor Intel</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #f0ede6; color: #0a0a0a; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-icon { position: absolute; top: -40px; right: -30px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 500px; color: rgba(10, 10, 10, 0.05); line-height: 1; pointer-events: none; }
.red-block { position: absolute; top: 0; left: 0; width: 8px; height: 100%; background: #ff3d00; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px 100px 100px 120px; }
.badge { display: inline-block; font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #ffffff; background: #0a0a0a; padding: 8px 16px; margin-bottom: 40px; width: fit-content; }
.tool-name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 60px; line-height: 1.05; color: #0a0a0a; margin-bottom: 30px; }
.tool-name em { font-style: normal; color: #ff3d00; }
.accent-line { width: 60px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.tool-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; line-height: 1.6; color: rgba(10, 10, 10, 0.6); max-width: 650px; margin-bottom: 40px; }
.metrics { display: flex; gap: 40px; }
.metric { display: flex; flex-direction: column; padding: 20px; border: 2px solid #0a0a0a; }
.metric-value { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ff3d00; }
.metric-label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(10, 10, 10, 0.5); margin-top: 4px; }
.footer { position: absolute; bottom: 60px; left: 120px; right: 100px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #0a0a0a; }
.logo span { color: #ff3d00; }
.cta { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #ff3d00; }
</style>
</head>
<body>
<div class="ghost-icon">?</div>
<div class="red-block"></div>
<div class="content">
<div class="badge">Free AI Tool</div>
<div class="tool-name">Competitor <em>Intel</em></div>
<div class="accent-line"></div>
<div class="tool-desc">Paste a competitor's URL. Get a breakdown of their positioning, pricing signals, strengths, and gaps you can exploit.</div>
<div class="metrics">
<div class="metric">
<div class="metric-value">SWOT</div>
<div class="metric-label">Analysis</div>
</div>
<div class="metric">
<div class="metric-value">GAP</div>
<div class="metric-label">Detection</div>
</div>
<div class="metric">
<div class="metric-value">SEO</div>
<div class="metric-label">Signals</div>
</div>
</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="cta">Try Free &rarr; agenticconsciousness.com.au</div>
</div>
</body>
</html>
