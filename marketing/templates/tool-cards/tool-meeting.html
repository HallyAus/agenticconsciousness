<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Tool — Meeting Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; top: -20px; left: -10px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 280px; color: rgba(255, 255, 255, 0.04); line-height: 1; pointer-events: none; letter-spacing: -10px; }
.grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 61, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 61, 0, 0.05) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px; z-index: 1; }
.badge { display: inline-block; font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #0a0a0a; background: #ff3d00; padding: 8px 16px; margin-bottom: 40px; width: fit-content; }
.tool-name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 64px; line-height: 1.05; color: #ffffff; margin-bottom: 30px; }
.tool-name em { font-style: normal; color: #ff3d00; }
.accent-line { width: 60px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.tool-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; line-height: 1.6; color: rgba(255, 255, 255, 0.6); max-width: 650px; margin-bottom: 40px; }
.outputs { display: flex; gap: 20px; }
.output { padding: 16px 24px; border: 2px solid rgba(255, 61, 0, 0.4); background: rgba(255, 61, 0, 0.05); }
.output span { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #ff3d00; }
.footer { position: absolute; bottom: 60px; left: 100px; right: 100px; display: flex; justify-content: space-between; align-items: center; z-index: 1; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.cta { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #ff3d00; }
</style>
</head>
<body>
<div class="ghost-text">NOTES</div>
<div class="grid-overlay"></div>
<div class="content">
<div class="badge">Free AI Tool</div>
<div class="tool-name">Meeting <em>Notes</em></div>
<div class="accent-line"></div>
<div class="tool-desc">Paste your meeting transcript or rough notes. Get structured minutes, action items, and follow-up tasks instantly.</div>
<div class="outputs">
<div class="output"><span>Summary</span></div>
<div class="output"><span>Action Items</span></div>
<div class="output"><span>Follow-ups</span></div>
</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="cta">Try Free &rarr; agenticconsciousness.com.au</div>
</div>
</body>
</html>
