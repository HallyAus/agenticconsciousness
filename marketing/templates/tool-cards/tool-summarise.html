<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Tool — Document Summariser</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1080px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-lines { position: absolute; top: 200px; right: 60px; display: flex; flex-direction: column; gap: 8px; opacity: 0.06; }
.ghost-line { height: 3px; background: #ffffff; }
.ghost-line:nth-child(1) { width: 300px; }
.ghost-line:nth-child(2) { width: 250px; }
.ghost-line:nth-child(3) { width: 280px; }
.ghost-line:nth-child(4) { width: 200px; }
.ghost-line:nth-child(5) { width: 260px; }
.ghost-line:nth-child(6) { width: 180px; }
.ghost-line:nth-child(7) { width: 240px; }
.ghost-line:nth-child(8) { width: 220px; }
.red-accent-top { position: absolute; top: 0; right: 0; width: 50%; height: 4px; background: #ff3d00; }
.content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 100px; }
.badge { display: inline-block; font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #ff3d00; border: 1px solid #ff3d00; padding: 8px 16px; margin-bottom: 40px; width: fit-content; }
.tool-name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 58px; line-height: 1.05; color: #ffffff; margin-bottom: 30px; }
.tool-name em { font-style: normal; color: #ff3d00; }
.accent-line { width: 60px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.tool-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; line-height: 1.6; color: rgba(255, 255, 255, 0.6); max-width: 600px; margin-bottom: 40px; }
.stats { display: flex; gap: 50px; }
.stat-value { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 36px; color: #ff3d00; }
.stat-label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.4); margin-top: 4px; }
.footer { position: absolute; bottom: 60px; left: 100px; right: 100px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 28px; color: #ffffff; }
.logo span { color: #ff3d00; }
.cta { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #ff3d00; }
</style>
</head>
<body>
<div class="ghost-lines">
<div class="ghost-line"></div>
<div class="ghost-line"></div>
<div class="ghost-line"></div>
<div class="ghost-line"></div>
<div class="ghost-line"></div>
<div class="ghost-line"></div>
<div class="ghost-line"></div>
<div class="ghost-line"></div>
</div>
<div class="red-accent-top"></div>
<div class="content">
<div class="badge">Free AI Tool</div>
<div class="tool-name">Document <em>Summariser</em></div>
<div class="accent-line"></div>
<div class="tool-desc">Upload any document. Get key points, action items, and a one-paragraph summary. Works with PDFs, Word docs, and more.</div>
<div class="stats">
<div class="stat">
<div class="stat-value">50pg</div>
<div class="stat-label">To 1 Page</div>
</div>
<div class="stat">
<div class="stat-value">10s</div>
<div class="stat-label">Average Time</div>
</div>
</div>
</div>
<div class="footer">
<div class="logo">AC<span>_</span></div>
<div class="cta">Try Free &rarr; agenticconsciousness.com.au</div>
</div>
</body>
</html>
