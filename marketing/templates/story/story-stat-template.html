<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Story — Stat Template</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-percent { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 800px; color: rgba(255, 61, 0, 0.06); line-height: 1; pointer-events: none; }
.border-frame { position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px; border: 2px solid rgba(255, 61, 0, 0.2); }
.header { position: absolute; top: 100px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; z-index: 1; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 32px; color: #ffffff; }
.logo span { color: #ff3d00; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #ff3d00; }
.content { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); padding: 0 80px; text-align: center; z-index: 1; }
.stat-category { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 40px; }
.stat-number { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 200px; line-height: 1; color: #ffffff; margin-bottom: 20px; }
.stat-unit { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 24px; text-transform: uppercase; letter-spacing: 6px; color: #ff3d00; margin-bottom: 50px; }
.accent-line { width: 80px; height: 2px; background: #ff3d00; margin: 0 auto 40px; }
.stat-context { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 28px; line-height: 1.5; color: rgba(255, 255, 255, 0.6); max-width: 700px; margin: 0 auto; }
.footer { position: absolute; bottom: 100px; left: 80px; right: 80px; text-align: center; z-index: 1; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-percent">%</div>
<div class="border-frame"></div>
<div class="header">
<div class="logo">AC<span>_</span></div>
<div class="label">// Data Point</div>
</div>
<div class="content">
<div class="stat-category">// Time Saved With AI</div>
<div class="stat-number">73%</div>
<div class="stat-unit">Reduction in manual work</div>
<div class="accent-line"></div>
<div class="stat-context">Businesses using AI automation report saving an average of 73% of time on repetitive administrative tasks.</div>
</div>
<div class="footer">
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
