<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Story — Tool Promo Template</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-icon { position: absolute; top: 300px; right: -40px; font-family: 'Space Mono', monospace; font-weight: 400; font-size: 500px; color: rgba(255, 255, 255, 0.04); line-height: 1; pointer-events: none; }
.top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #ff3d00; }
.header { position: absolute; top: 100px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 32px; color: #ffffff; }
.logo span { color: #ff3d00; }
.free-badge { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #0a0a0a; background: #ff3d00; padding: 10px 20px; }
.content { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); padding: 0 80px; }
.tool-icon { width: 80px; height: 80px; border: 2px solid #ff3d00; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; }
.tool-icon span { font-family: 'Space Mono', monospace; font-size: 32px; color: #ff3d00; }
.tool-category { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; margin-bottom: 30px; }
.tool-name { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 72px; line-height: 1.05; color: #ffffff; margin-bottom: 30px; }
.tool-name em { font-style: normal; color: #ff3d00; }
.accent-line { width: 80px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.tool-desc { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 28px; line-height: 1.5; color: rgba(255, 255, 255, 0.6); max-width: 800px; margin-bottom: 50px; }
.tool-features { display: flex; flex-wrap: wrap; gap: 12px; }
.tool-feature { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.5); padding: 10px 18px; border: 1px solid rgba(255, 255, 255, 0.1); }
.footer { position: absolute; bottom: 100px; left: 80px; right: 80px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.cta-button { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 20px; color: #0a0a0a; background: #ff3d00; padding: 20px 60px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-icon">&gt;_</div>
<div class="top-bar"></div>
<div class="header">
<div class="logo">AC<span>_</span></div>
<div class="free-badge">Free Tool</div>
</div>
<div class="content">
<div class="tool-icon"><span>T</span></div>
<div class="tool-category">// AI Tool</div>
<div class="tool-name">Tool <em>Name</em></div>
<div class="accent-line"></div>
<div class="tool-desc">Replace this with a short, punchy description of what the tool does and why someone should try it.</div>
<div class="tool-features">
<div class="tool-feature">Feature One</div>
<div class="tool-feature">Feature Two</div>
<div class="tool-feature">Feature Three</div>
</div>
</div>
<div class="footer">
<div class="cta-button">Try It Free</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
