<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Story — CTA Template</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; background: #ff3d00; color: #0a0a0a; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-arrow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 800px; color: rgba(10, 10, 10, 0.06); line-height: 1; pointer-events: none; }
.border-frame { position: absolute; top: 60px; left: 60px; right: 60px; bottom: 60px; border: 2px solid #0a0a0a; }
.header { position: absolute; top: 100px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; z-index: 1; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 32px; color: #0a0a0a; }
.logo span { color: #ffffff; }
.content { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); padding: 0 100px; text-align: center; z-index: 1; }
.cta-pre { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 16px; text-transform: uppercase; letter-spacing: 4px; color: #0a0a0a; margin-bottom: 40px; opacity: 0.6; }
.cta-headline { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 80px; line-height: 1.05; color: #0a0a0a; margin-bottom: 40px; }
.cta-headline em { font-style: normal; color: #ffffff; }
.accent-line { width: 80px; height: 2px; background: #0a0a0a; margin: 0 auto 40px; }
.cta-sub { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 26px; line-height: 1.5; color: rgba(10, 10, 10, 0.6); max-width: 700px; margin: 0 auto 60px; }
.cta-button { display: inline-block; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 22px; color: #ff3d00; background: #0a0a0a; padding: 24px 80px; text-transform: uppercase; letter-spacing: 3px; }
.footer { position: absolute; bottom: 100px; left: 80px; right: 80px; text-align: center; z-index: 1; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; color: rgba(10, 10, 10, 0.5); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-arrow">&rarr;</div>
<div class="border-frame"></div>
<div class="header">
<div class="logo">AC<span>_</span></div>
</div>
<div class="content">
<div class="cta-pre">// Ready?</div>
<div class="cta-headline">Let's build something <em>smarter.</em></div>
<div class="accent-line"></div>
<div class="cta-sub">Free strategy call. No commitment. Just clarity on where AI fits in your business.</div>
<div class="cta-button">Book Now</div>
</div>
<div class="footer">
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
