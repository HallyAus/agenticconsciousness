<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Story — Quote Template</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-quote { position: absolute; top: 250px; left: -30px; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 700px; color: rgba(255, 61, 0, 0.06); line-height: 1; pointer-events: none; }
.left-accent { position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: #ff3d00; }
.header { position: absolute; top: 100px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 32px; color: #ffffff; }
.logo span { color: #ff3d00; }
.content { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); padding: 0 100px; }
.quote-mark { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 120px; color: #ff3d00; line-height: 0.8; margin-bottom: 20px; }
.quote-text { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 56px; line-height: 1.15; color: #ffffff; margin-bottom: 50px; }
.quote-text em { font-style: normal; color: #ff3d00; }
.accent-line { width: 60px; height: 2px; background: #ff3d00; margin-bottom: 30px; }
.attribution { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 16px; text-transform: uppercase; letter-spacing: 3px; color: rgba(255, 255, 255, 0.5); }
.footer { position: absolute; bottom: 100px; left: 80px; right: 80px; text-align: center; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-quote">&ldquo;</div>
<div class="left-accent"></div>
<div class="header">
<div class="logo">AC<span>_</span></div>
</div>
<div class="content">
<div class="quote-mark">&ldquo;</div>
<div class="quote-text">Replace this with your <em>quote text.</em> Keep it punchy.</div>
<div class="accent-line"></div>
<div class="attribution">&mdash; Attribution Here</div>
</div>
<div class="footer">
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
