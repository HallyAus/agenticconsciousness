<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC_ Story — Before/After Template</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; background: #0a0a0a; color: #ffffff; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; position: relative; }
.ghost-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 300px; color: rgba(255, 255, 255, 0.04); line-height: 1; pointer-events: none; }
.divider { position: absolute; top: 50%; left: 60px; right: 60px; height: 2px; background: #ff3d00; }
.divider-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 10px 30px; font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: #ff3d00; z-index: 2; }
.header { position: absolute; top: 80px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 32px; color: #ffffff; }
.logo span { color: #ff3d00; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: #ff3d00; }
.before-section { position: absolute; top: 200px; left: 80px; right: 80px; height: calc(50% - 200px); display: flex; flex-direction: column; justify-content: center; }
.section-label { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 14px; text-transform: uppercase; letter-spacing: 4px; color: rgba(255, 255, 255, 0.3); margin-bottom: 30px; }
.before-title { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 52px; line-height: 1.1; color: rgba(255, 255, 255, 0.4); margin-bottom: 20px; }
.before-items { display: flex; flex-direction: column; gap: 12px; }
.before-item { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; color: rgba(255, 255, 255, 0.3); padding-left: 20px; border-left: 2px solid rgba(255, 255, 255, 0.1); }
.after-section { position: absolute; top: calc(50% + 30px); left: 80px; right: 80px; height: calc(50% - 200px); display: flex; flex-direction: column; justify-content: center; }
.after-title { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; font-size: 52px; line-height: 1.1; color: #ffffff; margin-bottom: 20px; }
.after-title em { font-style: normal; color: #ff3d00; }
.after-items { display: flex; flex-direction: column; gap: 12px; }
.after-item { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; font-size: 22px; color: rgba(255, 255, 255, 0.7); padding-left: 20px; border-left: 2px solid #ff3d00; }
.footer { position: absolute; bottom: 80px; left: 80px; right: 80px; text-align: center; }
.url { font-family: 'Space Mono', monospace; font-weight: 400; font-size: 13px; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="ghost-text">VS</div>
<div class="header">
<div class="logo">AC<span>_</span></div>
<div class="label">// Transformation</div>
</div>
<div class="before-section">
<div class="section-label">Before AI</div>
<div class="before-title">Manual Process</div>
<div class="before-items">
<div class="before-item">40 hours per week on admin</div>
<div class="before-item">Errors in every third invoice</div>
<div class="before-item">2-day response time</div>
</div>
</div>
<div class="divider"></div>
<div class="divider-label">With AI</div>
<div class="after-section">
<div class="section-label">After AI</div>
<div class="after-title"><em>Automated</em> Process</div>
<div class="after-items">
<div class="after-item">4 hours per week on admin</div>
<div class="after-item">99.8% accuracy rate</div>
<div class="after-item">Instant response time</div>
</div>
</div>
<div class="footer">
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
