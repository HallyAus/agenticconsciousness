<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Email Header 600x200</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:200px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:200px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ghost{position:absolute;right:20px;top:-10px;font-weight:900;font-size:180px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1}
.top{display:flex;justify-content:space-between;align-items:center;padding:16px 30px;border-bottom:2px solid rgba(255,61,0,0.2)}
.logo{font-family:'Space Mono',monospace;font-size:18px;color:#ff3d00}
.nav{display:flex;gap:20px}
.nav-item{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.content{flex:1;display:flex;align-items:center;padding:0 30px}
.headline{font-weight:900;font-size:32px;color:#fff;line-height:1.05;letter-spacing:-1px}
.red{color:#ff3d00}
.divider{width:2px;height:50px;background:rgba(255,61,0,0.3);margin:0 30px}
.sub{font-weight:300;font-size:13px;color:rgba(255,255,255,0.5);line-height:1.4}
.accent-line{height:3px;background:#ff3d00;width:100%}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="top">
<div class="logo">AC_</div>
<div class="nav">
<span class="nav-item">Services</span>
<span class="nav-item">Tools</span>
<span class="nav-item">Blog</span>
</div>
</div>
<div class="content">
<div class="headline">Agentic<br><span class="red">Consciousness</span></div>
<div class="divider"></div>
<div class="sub">AI consulting that builds,<br>deploys, and supports.</div>
</div>
<div class="accent-line"></div>
</div>
</body>
</html>
