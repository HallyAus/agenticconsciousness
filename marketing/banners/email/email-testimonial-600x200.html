<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Testimonial 600x200</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:200px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:200px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex}
.ghost{position:absolute;left:-10px;top:-20px;font-weight:900;font-size:160px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1}
.quote-mark{width:60px;border-right:2px solid #ff3d00;display:flex;align-items:center;justify-content:center;background:rgba(255,61,0,0.04)}
.quote-mark span{font-weight:900;font-size:60px;color:#ff3d00;line-height:1;opacity:0.6}
.content{flex:1;padding:24px 30px;display:flex;flex-direction:column;justify-content:center}
.quote{font-weight:300;font-size:16px;color:rgba(255,255,255,0.8);line-height:1.4;font-style:italic}
.author{margin-top:12px;display:flex;align-items:center;gap:12px}
.author-line{width:20px;height:2px;background:#ff3d00}
.author-name{font-weight:900;font-size:12px;color:#fff}
.author-role{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4)}
.logo{font-family:'Space Mono',monospace;font-size:12px;color:#ff3d00;padding:0 20px;display:flex;align-items:center;border-left:2px solid rgba(255,61,0,0.15)}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">"</div>
<div class="quote-mark"><span>"</span></div>
<div class="content">
<div class="quote">"They didn't just advise — they built the system, deployed it, and trained our team. Production-ready in two weeks."</div>
<div class="author">
<div class="author-line"></div>
<div>
<div class="author-name">Sarah Mitchell</div>
<div class="author-role">Operations Director, TechFlow AU</div>
</div>
</div>
</div>
<div class="logo">AC_</div>
</div>
</body>
</html>
