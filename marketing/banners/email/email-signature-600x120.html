<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Email Signature 600x120</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:120px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:120px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;align-items:center}
.ghost{position:absolute;right:10px;top:-10px;font-weight:900;font-size:110px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1}
.accent{width:4px;height:100%;background:#ff3d00}
.logo-section{padding:0 20px;display:flex;align-items:center;gap:14px}
.logo{font-family:'Space Mono',monospace;font-size:22px;color:#ff3d00}
.divider{width:2px;height:50px;background:rgba(255,61,0,0.3)}
.info{flex:1;padding:0 16px}
.name{font-weight:900;font-size:16px;color:#fff}
.title{font-weight:300;font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.details{display:flex;gap:16px;margin-top:6px}
.detail{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4)}
.detail span{color:#ff3d00}
.right{padding:0 20px;text-align:right;border-left:2px solid rgba(255,61,0,0.15)}
.url{font-family:'Space Mono',monospace;font-size:9px;color:#ff3d00}
.email{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.4);margin-top:4px}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="accent"></div>
<div class="logo-section">
<div class="logo">AC_</div>
<div class="divider"></div>
</div>
<div class="info">
<div class="name">Daniel Hall</div>
<div class="title">Founder &amp; AI Consultant</div>
<div class="details">
<div class="detail"><span>→</span> 21+ years experience</div>
<div class="detail"><span>→</span> 8+ free AI tools</div>
</div>
</div>
<div class="right">
<div class="url">agenticconsciousness.com.au</div>
<div class="email">ai@agenticconsciousness.com.au</div>
</div>
</div>
</body>
</html>
