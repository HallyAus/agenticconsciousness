<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Compact Email Header 600x150</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:150px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:150px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;align-items:center;padding:0 30px}
.ghost{position:absolute;right:-10px;top:-20px;font-weight:900;font-size:150px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1}
.logo{font-family:'Space Mono',monospace;font-size:24px;color:#ff3d00;margin-right:24px;padding-right:24px;border-right:2px solid #ff3d00}
.content{flex:1}
.headline{font-weight:900;font-size:24px;color:#fff;line-height:1.1;letter-spacing:-0.5px}
.red{color:#ff3d00}
.sub{font-weight:300;font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;font-family:'Space Mono',monospace}
.accent{position:absolute;bottom:0;left:0;right:0;height:3px;background:#ff3d00}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">Agentic <span class="red">Consciousness</span></div>
<div class="sub">AI consulting &middot; Strategy &middot; Automation</div>
</div>
<div class="accent"></div>
</div>
</body>
</html>
