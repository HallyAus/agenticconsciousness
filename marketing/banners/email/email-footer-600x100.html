<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Email Footer 600x100</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:100px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:100px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column}
.accent{height:3px;background:#ff3d00;width:100%}
.content{flex:1;display:flex;align-items:center;padding:0 30px;justify-content:space-between}
.left{display:flex;align-items:center;gap:16px}
.logo{font-family:'Space Mono',monospace;font-size:14px;color:#ff3d00}
.divider{width:2px;height:24px;background:rgba(255,61,0,0.3)}
.links{display:flex;gap:16px}
.link{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.right{text-align:right}
.url{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3)}
.email{font-family:'Space Mono',monospace;font-size:9px;color:#ff3d00;margin-top:2px}
</style>
</head>
<body>
<div class="banner">
<div class="accent"></div>
<div class="content">
<div class="left">
<div class="logo">AC_</div>
<div class="divider"></div>
<div class="links">
<span class="link">Services</span>
<span class="link">Tools</span>
<span class="link">Blog</span>
<span class="link">Unsubscribe</span>
</div>
</div>
<div class="right">
<div class="url">agenticconsciousness.com.au</div>
<div class="email">ai@agenticconsciousness.com.au</div>
</div>
</div>
</div>
</body>
</html>
