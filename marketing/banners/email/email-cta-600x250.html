<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Email CTA 600x250</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:250px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:250px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.ghost{position:absolute;left:-30px;top:20px;font-weight:900;font-size:220px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.eyebrow{font-family:'Space Mono',monospace;font-size:10px;color:#ff3d00;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px}
.headline{font-weight:900;font-size:32px;color:#fff;line-height:1.1;letter-spacing:-1px}
.red{color:#ff3d00}
.sub{font-weight:300;font-size:13px;color:rgba(255,255,255,0.5);margin-top:8px;line-height:1.4}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:14px;padding:16px 40px;text-transform:uppercase;letter-spacing:1px;margin-top:20px;display:inline-block}
.url{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.2);margin-top:12px}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="eyebrow">Ready to Start?</div>
<div class="headline">Book a Free<br><span class="red">AI Consultation</span></div>
<div class="sub">30 minutes. No obligation. Real recommendations.</div>
<div class="cta">Book Your Spot →</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
