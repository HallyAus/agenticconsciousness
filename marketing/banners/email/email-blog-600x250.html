<!DOCTYPE html>
<html lang="en">
<head>

<title>AC_ Blog Email 600x250</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:250px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:250px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex}
.ghost{position:absolute;right:30px;top:-10px;font-weight:900;font-size:200px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.sidebar{width:180px;border-right:2px solid #ff3d00;background:rgba(255,61,0,0.04);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.logo{font-family:'Space Mono',monospace;font-size:16px;color:#ff3d00;margin-bottom:10px}
.badge{font-family:'Space Mono',monospace;font-size:8px;color:#0a0a0a;background:#ff3d00;padding:4px 10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.date{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3)}
.content{flex:1;padding:24px 30px;display:flex;flex-direction:column;justify-content:center}
.category{font-family:'Space Mono',monospace;font-size:9px;color:#ff3d00;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.headline{font-weight:900;font-size:22px;color:#fff;line-height:1.15;letter-spacing:-0.5px}
.excerpt{font-weight:300;font-size:12px;color:rgba(255,255,255,0.5);margin-top:8px;line-height:1.5}
.cta{color:#ff3d00;font-weight:900;font-size:12px;margin-top:14px;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="sidebar">
<div class="logo">AC_</div>
<div class="badge">New Post</div>
<div class="date">28 Mar 2026</div>
</div>
<div class="content">
<div class="category">AI Strategy</div>
<div class="headline">Why 90% of AI Projects Fail (And How to Be the 10%)</div>
<div class="excerpt">Most businesses approach AI backwards. They start with the technology instead of the problem. Here's the framework that actually works.</div>
<div class="cta">Read Article →</div>
</div>
</div>
</body>
</html>
