<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Welcome Email 600x300</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:600px;height:300px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:600px;height:300px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ghost{position:absolute;right:-20px;bottom:-30px;font-weight:900;font-size:260px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.top-bar{height:4px;background:#ff3d00}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 30px;border-bottom:2px solid rgba(255,61,0,0.15)}
.logo{font-family:'Space Mono',monospace;font-size:16px;color:#ff3d00}
.tag{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2px}
.content{flex:1;padding:24px 30px;display:flex;flex-direction:column;justify-content:center}
.headline{font-weight:900;font-size:36px;color:#fff;line-height:1.05;letter-spacing:-1.5px}
.red{color:#ff3d00}
.body{font-weight:300;font-size:13px;color:rgba(255,255,255,0.5);margin-top:10px;line-height:1.5;max-width:400px}
.cta-row{display:flex;gap:2px;margin-top:18px}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:12px;padding:12px 24px;text-transform:uppercase;letter-spacing:1px}
.cta-secondary{border:2px solid rgba(255,61,0,0.3);color:rgba(255,255,255,0.5);font-size:12px;padding:12px 24px;font-weight:300}
.url{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.2);padding:8px 30px;border-top:1px solid rgba(255,61,0,0.1)}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="top-bar"></div>
<div class="header">
<div class="logo">AC_</div>
<div class="tag">Welcome Aboard</div>
</div>
<div class="content">
<div class="headline">Welcome to <span class="red">the Future</span></div>
<div class="body">You're in. Here's what happens next: we'll send you our best AI insights, free tools, and actionable strategies weekly.</div>
<div class="cta-row">
<div class="cta">Explore Free Tools →</div>
<div class="cta-secondary">Read the Blog</div>
</div>
</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
