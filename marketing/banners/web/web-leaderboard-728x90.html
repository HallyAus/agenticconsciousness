<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}

.sub{font-weight:300;font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;font-family:'Space Mono',monospace}
.cta{background:#ff3d00;color:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif;font-weight:900;font-size:12px;padding:10px 20px;text-decoration:none;text-transform:uppercase;letter-spacing:1px;margin-right:16px;white-space:nowrap;display:flex;align-items:center;height:100%;border-left:2px solid #ff3d00}
