<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Medium Rectangle 300x250</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:300px;height:250px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:300px;height:250px;border:2px solid #ff3d00;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ghost{position:absolute;right:-10px;bottom:-20px;font-weight:900;font-size:160px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1}
.top{padding:20px;flex:1;display:flex;flex-direction:column;justify-content:center}
.logo{font-family:'Space Mono',monospace;font-size:14px;color:#ff3d00;margin-bottom:12px}
.headline{font-weight:900;font-size:24px;color:#fff;line-height:1.05;letter-spacing:-1px}
.sub{font-weight:300;font-size:12px;color:rgba(255,255,255,0.6);margin-top:8px;line-height:1.4}
.bottom{border-top:2px solid #ff3d00;display:flex}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:12px;padding:14px 20px;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center}
.url{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);padding:14px 12px;display:flex;align-items:center}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="top">
<div class="logo">AC_</div>
<div class="headline">Stop Guessing.<br>Start Automating.</div>
<div class="sub">AI strategy for businesses that want results, not reports.</div>
</div>
<div class="bottom">
<div class="cta">Book Free Consult</div>
<div class="url">agenticconsciousness<br>.com.au</div>
</div>
</div>
</body>
</html>
