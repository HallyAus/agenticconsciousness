<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Hero Short 1920x400</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:1920px;height:400px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:1920px;height:400px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex}
.ghost{position:absolute;right:60px;top:-40px;font-weight:900;font-size:380px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.left{flex:1;padding:50px 60px;display:flex;flex-direction:column;justify-content:center}
.logo{font-family:'Space Mono',monospace;font-size:20px;color:#ff3d00;margin-bottom:20px}
.headline{font-weight:900;font-size:56px;color:#fff;line-height:1;letter-spacing:-2px}
.red{color:#ff3d00}
.sub{font-weight:300;font-size:16px;color:rgba(255,255,255,0.5);margin-top:16px;max-width:500px;line-height:1.5}
.cta-row{display:flex;gap:2px;margin-top:28px}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:13px;padding:16px 30px;text-transform:uppercase;letter-spacing:1px}
.right{width:500px;border-left:2px solid #ff3d00;display:grid;grid-template-rows:1fr 1fr;grid-template-columns:1fr 1fr;gap:2px}
.stat{padding:20px;display:flex;flex-direction:column;justify-content:center;background:rgba(255,61,0,0.04);border-bottom:1px solid rgba(255,61,0,0.1)}
.stat-num{font-weight:900;font-size:36px;color:#ff3d00;line-height:1}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.url-bar{position:absolute;bottom:0;left:0;right:0;border-top:2px solid rgba(255,61,0,0.15);padding:10px 60px;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="left">
<div class="logo">AC_</div>
<div class="headline">Deploy AI.<br><span class="red">Not Decks.</span></div>
<div class="sub">We build production AI systems for Australian businesses. No PowerPoint. No hand-waving. Just working software.</div>
<div class="cta-row">
<div class="cta">Book Consultation →</div>
</div>
</div>
<div class="right">
<div class="stat"><div class="stat-num">8+</div><div class="stat-label">Free Tools</div></div>
<div class="stat"><div class="stat-num">21yr</div><div class="stat-label">Experience</div></div>
<div class="stat"><div class="stat-num">AU</div><div class="stat-label">Based</div></div>
<div class="stat"><div class="stat-num">∞</div><div class="stat-label">Scalable</div></div>
</div>
<div class="url-bar">agenticconsciousness.com.au</div>
</div>
</body>
</html>
