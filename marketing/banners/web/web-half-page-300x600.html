<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Half Page 300x600</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:300px;height:600px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:300px;height:600px;border:2px solid #ff3d00;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ghost{position:absolute;right:-20px;top:150px;font-weight:900;font-size:240px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:2px solid #ff3d00}
.logo{font-family:'Space Mono',monospace;font-size:18px;color:#ff3d00}
.tag{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2px}
.hero{flex:1;padding:30px 20px;display:flex;flex-direction:column;justify-content:center}
.eyebrow{font-family:'Space Mono',monospace;font-size:9px;color:#ff3d00;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.headline{font-weight:900;font-size:32px;color:#fff;line-height:1.05;letter-spacing:-1px}
.red{color:#ff3d00}
.divider{width:50px;height:2px;background:#ff3d00;margin:20px 0}
.body{font-weight:300;font-size:13px;color:rgba(255,255,255,0.6);line-height:1.5}
.features{margin-top:24px;display:flex;flex-direction:column;gap:2px}
.feature{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,61,0,0.06);border-left:2px solid #ff3d00}
.feature-text{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.7)}
.feature-icon{color:#ff3d00;font-size:10px;font-weight:900}
.cta-bar{display:flex;border-top:2px solid #ff3d00}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:13px;padding:18px;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center}
.url-bar{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);padding:10px;text-align:center;border-top:1px solid rgba(255,61,0,0.15)}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">A</div>
<div class="header">
<div class="logo">AC_</div>
<div class="tag">AI Consulting</div>
</div>
<div class="hero">
<div class="eyebrow">Agentic Consciousness</div>
<div class="headline">Your Business.<br><span class="red">Powered by AI.</span></div>
<div class="divider"></div>
<div class="body">We build AI systems that integrate into your workflow. Not experiments — production tools.</div>
<div class="features">
<div class="feature"><span class="feature-icon">→</span><span class="feature-text">Custom AI Agents</span></div>
<div class="feature"><span class="feature-icon">→</span><span class="feature-text">Workflow Automation</span></div>
<div class="feature"><span class="feature-icon">→</span><span class="feature-text">AI Strategy & Training</span></div>
<div class="feature"><span class="feature-icon">→</span><span class="feature-text">Free AI Tools</span></div>
</div>
</div>
<div class="cta-bar">
<div class="cta">Book Free Consultation →</div>
</div>
<div class="url-bar">agenticconsciousness.com.au</div>
</div>
</body>
</html>
