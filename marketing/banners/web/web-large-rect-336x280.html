<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Large Rectangle 336x280</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:336px;height:280px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:336px;height:280px;border:2px solid #ff3d00;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ghost{position:absolute;left:-20px;top:40px;font-weight:900;font-size:200px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:2px solid rgba(255,61,0,0.2)}
.logo{font-family:'Space Mono',monospace;font-size:14px;color:#ff3d00}
.label{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2px}
.content{flex:1;padding:20px;display:flex;flex-direction:column;justify-content:center}
.stat{font-weight:900;font-size:48px;color:#ff3d00;line-height:1}
.stat-label{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.headline{font-weight:900;font-size:18px;color:#fff;line-height:1.1;margin-top:16px}
.bottom{border-top:2px solid #ff3d00;display:flex}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:11px;padding:12px 20px;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center}
.url{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.4);padding:12px;display:flex;align-items:center}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="header">
<div class="logo">AC_</div>
<div class="label">AI Consulting</div>
</div>
<div class="content">
<div class="stat">73%</div>
<div class="stat-label">Efficiency gains achieved</div>
<div class="headline">Your competitors are already using AI.</div>
</div>
<div class="bottom">
<div class="cta">Get Your AI Audit</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</div>
</body>
</html>
