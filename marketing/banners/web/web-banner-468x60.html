<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Banner 468x60</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:468px;height:60px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:468px;height:60px;border:2px solid #ff3d00;display:flex;align-items:center;position:relative;overflow:hidden}
.ghost{position:absolute;right:10px;top:-5px;font-weight:900;font-size:60px;color:rgba(255,61,0,0.06);pointer-events:none}
.logo{font-family:'Space Mono',monospace;font-size:12px;color:#ff3d00;padding:0 14px;white-space:nowrap;border-right:2px solid #ff3d00;height:100%;display:flex;align-items:center}
.content{flex:1;padding:0 14px}
.headline{font-weight:900;font-size:14px;color:#fff;line-height:1.1}
.sub{font-weight:300;font-size:9px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:10px;padding:8px 14px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;height:100%;display:flex;align-items:center;border-left:2px solid #ff3d00}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">AI Strategy & Automation</div>
<div class="sub">agenticconsciousness.com.au</div>
</div>
<div class="cta">Learn More</div>
</div>
</body>
</html>
