<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Sticky Bar 1200x80</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:1200px;height:80px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:1200px;height:80px;border:2px solid #ff3d00;display:flex;align-items:center;position:relative;overflow:hidden}
.ghost{position:absolute;right:200px;top:-10px;font-weight:900;font-size:80px;color:rgba(255,61,0,0.04);pointer-events:none}
.logo{font-family:'Space Mono',monospace;font-size:16px;color:#ff3d00;padding:0 24px;border-right:2px solid #ff3d00;height:100%;display:flex;align-items:center}
.content{flex:1;display:flex;align-items:center;padding:0 24px;gap:24px}
.headline{font-weight:900;font-size:16px;color:#fff;white-space:nowrap}
.red{color:#ff3d00}
.pipe{width:2px;height:30px;background:rgba(255,61,0,0.3)}
.promo{font-weight:300;font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap}
.promo strong{color:#ff3d00;font-weight:900}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:12px;padding:0 28px;text-transform:uppercase;letter-spacing:1px;height:100%;display:flex;align-items:center;border-left:2px solid #ff3d00;white-space:nowrap}
.close{font-family:'Space Mono',monospace;font-size:12px;color:rgba(255,255,255,0.3);padding:0 16px;height:100%;display:flex;align-items:center;border-left:2px solid rgba(255,61,0,0.15)}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">Free AI Readiness <span class="red">Audit</span></div>
<div class="pipe"></div>
<div class="promo">Find out if your business is ready for AI — <strong>takes 2 minutes</strong></div>
</div>
<div class="cta">Start Free Audit →</div>
<div class="close">✕</div>
</div>
</body>
</html>
