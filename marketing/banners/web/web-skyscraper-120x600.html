<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Skyscraper 120x600</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:120px;height:600px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:120px;height:600px;border:2px solid #ff3d00;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ghost{position:absolute;left:-15px;top:200px;font-weight:900;font-size:120px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1;writing-mode:vertical-rl}
.logo{font-family:'Space Mono',monospace;font-size:16px;color:#ff3d00;padding:16px;text-align:center;border-bottom:2px solid #ff3d00}
.content{flex:1;padding:16px 12px;display:flex;flex-direction:column;justify-content:center}
.headline{font-weight:900;font-size:16px;color:#fff;line-height:1.15;letter-spacing:-0.5px}
.red{color:#ff3d00}
.divider{width:30px;height:2px;background:#ff3d00;margin:12px 0}
.sub{font-weight:300;font-size:9px;color:rgba(255,255,255,0.5);line-height:1.4}
.tools{margin-top:16px}
.tool{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.4);padding:3px 0;border-bottom:1px solid rgba(255,61,0,0.15)}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:10px;padding:14px 8px;text-transform:uppercase;letter-spacing:0.5px;text-align:center}
.url{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,0.3);text-align:center;padding:8px 4px}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AGENTIC</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">Think.<br><span class="red">Build.</span><br>Deploy.</div>
<div class="divider"></div>
<div class="sub">AI consulting for businesses ready to move.</div>
<div class="tools">
<div class="tool">→ AI Audit</div>
<div class="tool">→ Automation</div>
<div class="tool">→ Strategy</div>
<div class="tool">→ Training</div>
</div>
</div>
<div class="cta">Start Free</div>
<div class="url">agenticconsciousness<br>.com.au</div>
</div>
</body>
</html>
