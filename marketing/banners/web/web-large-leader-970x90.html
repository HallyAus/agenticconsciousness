<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Large Leaderboard 970x90</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:970px;height:90px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:970px;height:90px;border:2px solid #ff3d00;display:flex;align-items:center;position:relative;overflow:hidden}
.ghost{position:absolute;right:100px;top:-15px;font-weight:900;font-size:100px;color:rgba(255,61,0,0.04);pointer-events:none}
.logo{font-family:'Space Mono',monospace;font-size:18px;color:#ff3d00;padding:0 28px;border-right:2px solid #ff3d00;height:100%;display:flex;align-items:center}
.content{flex:1;padding:0 30px;display:flex;align-items:center;gap:30px}
.headline{font-weight:900;font-size:22px;color:#fff;line-height:1.1;letter-spacing:-0.5px;white-space:nowrap}
.red{color:#ff3d00}
.pipe{width:2px;height:40px;background:rgba(255,61,0,0.3)}
.features{display:flex;gap:20px}
.feature{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap}
.feature span{color:#ff3d00}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:13px;padding:0 28px;text-transform:uppercase;letter-spacing:1px;height:100%;display:flex;align-items:center;border-left:2px solid #ff3d00;white-space:nowrap}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AGENTIC</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">AI Consulting That <span class="red">Ships</span></div>
<div class="pipe"></div>
<div class="features">
<div class="feature"><span>→</span> AI Audit</div>
<div class="feature"><span>→</span> Automation</div>
<div class="feature"><span>→</span> Training</div>
<div class="feature"><span>→</span> Free Tools</div>
</div>
</div>
<div class="cta">Book Now →</div>
</div>
</body>
</html>
