<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Wide Skyscraper 160x600</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:160px;height:600px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:160px;height:600px;border:2px solid #ff3d00;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ghost{position:absolute;right:-30px;top:100px;font-weight:900;font-size:180px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1;writing-mode:vertical-rl}
.logo{font-family:'Space Mono',monospace;font-size:18px;color:#ff3d00;padding:20px 16px;border-bottom:2px solid #ff3d00}
.content{flex:1;padding:20px 14px;display:flex;flex-direction:column;justify-content:center}
.headline{font-weight:900;font-size:22px;color:#fff;line-height:1.1;letter-spacing:-0.5px}
.red{color:#ff3d00}
.divider{width:40px;height:2px;background:#ff3d00;margin:16px 0}
.sub{font-weight:300;font-size:11px;color:rgba(255,255,255,0.6);line-height:1.4}
.stats{margin-top:20px;display:flex;flex-direction:column;gap:2px}
.stat-box{background:rgba(255,61,0,0.08);padding:8px 10px;border-left:2px solid #ff3d00}
.stat-num{font-weight:900;font-size:18px;color:#ff3d00;line-height:1}
.stat-label{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:11px;padding:16px;text-transform:uppercase;letter-spacing:1px;text-align:center}
.url{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.3);text-align:center;padding:10px}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AGENT</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">AI That <span class="red">Works</span> For You</div>
<div class="divider"></div>
<div class="sub">Enterprise AI consulting. Real implementation, not slide decks.</div>
<div class="stats">
<div class="stat-box"><div class="stat-num">8+</div><div class="stat-label">AI Tools Built</div></div>
<div class="stat-box"><div class="stat-num">21yr</div><div class="stat-label">Industry Exp</div></div>
<div class="stat-box"><div class="stat-num">∞</div><div class="stat-label">Scalable</div></div>
</div>
</div>
<div class="cta">Book Consult</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
