<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Billboard 970x250</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:970px;height:250px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:970px;height:250px;border:2px solid #ff3d00;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.ghost{position:absolute;right:50px;top:-30px;font-weight:900;font-size:250px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.left{padding:30px 40px;display:flex;flex-direction:column;justify-content:center;border-right:2px solid rgba(255,61,0,0.2)}
.logo{font-family:'Space Mono',monospace;font-size:16px;color:#ff3d00;margin-bottom:16px}
.headline{font-weight:900;font-size:36px;color:#fff;line-height:1.05;letter-spacing:-1.5px}
.red{color:#ff3d00}
.sub{font-weight:300;font-size:13px;color:rgba(255,255,255,0.5);margin-top:12px;line-height:1.4}
.right{display:flex;flex-direction:column;justify-content:space-between;padding:30px 40px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.stat{background:rgba(255,61,0,0.06);padding:14px 16px;border-left:2px solid #ff3d00}
.stat-num{font-weight:900;font-size:28px;color:#ff3d00;line-height:1}
.stat-label{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.bottom-row{display:flex;gap:2px;align-items:center}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:13px;padding:14px 24px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.url{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.3);padding-left:16px}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="left">
<div class="logo">AC_</div>
<div class="headline">Build AI Systems<br>That <span class="red">Actually Work</span></div>
<div class="sub">We don't just advise — we build, deploy, and support AI systems for Australian businesses.</div>
</div>
<div class="right">
<div class="stats">
<div class="stat"><div class="stat-num">8+</div><div class="stat-label">Free AI Tools</div></div>
<div class="stat"><div class="stat-num">21yr</div><div class="stat-label">Experience</div></div>
<div class="stat"><div class="stat-num">24/7</div><div class="stat-label">AI Support</div></div>
<div class="stat"><div class="stat-num">∞</div><div class="stat-label">Scalable</div></div>
</div>
<div class="bottom-row">
<div class="cta">Book Free Consultation →</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</div>
</div>
</body>
</html>
