<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Half Banner 234x60</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:234px;height:60px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.banner{width:234px;height:60px;border:2px solid #ff3d00;display:flex;align-items:center;position:relative;overflow:hidden;padding:0 12px;gap:10px}
.ghost{position:absolute;right:-5px;top:-8px;font-weight:900;font-size:55px;color:rgba(255,61,0,0.06);pointer-events:none}
.logo{font-family:'Space Mono',monospace;font-size:11px;color:#ff3d00;white-space:nowrap}
.headline{font-weight:900;font-size:11px;color:#fff;line-height:1.2;flex:1}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:8px;padding:5px 8px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
</style>
</head>
<body>
<div class="banner">
<div class="ghost">AC_</div>
<div class="logo">AC_</div>
<div class="headline">AI Consulting</div>
<div class="cta">Go</div>
</div>
</body>
</html>
