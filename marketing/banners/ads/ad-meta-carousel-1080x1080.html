<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Meta Carousel 1080x1080</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:1080px;height:1080px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.ad{width:1080px;height:1080px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ghost{position:absolute;left:-40px;top:200px;font-weight:900;font-size:500px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.header{padding:40px 50px;border-bottom:2px solid #ff3d00;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Space Mono',monospace;font-size:24px;color:#ff3d00}
.slide-num{font-family:'Space Mono',monospace;font-size:14px;color:rgba(255,255,255,0.3)}
.slide-num span{color:#ff3d00}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:50px;text-align:center;align-items:center}
.icon{font-size:80px;margin-bottom:20px;color:#ff3d00;font-weight:900;font-family:'Be Vietnam Pro',sans-serif;line-height:1;width:120px;height:120px;border:3px solid #ff3d00;display:flex;align-items:center;justify-content:center;background:rgba(255,61,0,0.06)}
.headline{font-weight:900;font-size:64px;color:#fff;line-height:0.95;letter-spacing:-3px;max-width:800px}
.red{color:#ff3d00}
.divider{width:80px;height:3px;background:#ff3d00;margin:24px 0}
.body{font-weight:300;font-size:22px;color:rgba(255,255,255,0.5);line-height:1.5;max-width:600px}
.footer{padding:30px 50px;border-top:2px solid #ff3d00;display:flex;justify-content:space-between;align-items:center}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:16px;padding:16px 36px;text-transform:uppercase;letter-spacing:1px}
.nav-dots{display:flex;gap:8px}
.dot{width:8px;height:8px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,61,0,0.3)}
.dot.active{background:#ff3d00}
.url{font-family:'Space Mono',monospace;font-size:12px;color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<div class="ad">
<div class="ghost">01</div>
<div class="header">
<div class="logo">AC_</div>
<div class="slide-num"><span>01</span> / 05</div>
</div>
<div class="hero">
<div class="icon">→</div>
<div class="headline">Custom AI <span class="red">Agents</span></div>
<div class="divider"></div>
<div class="body">Purpose-built AI agents that handle your repetitive tasks. Integrated into your existing tools and workflows.</div>
</div>
<div class="footer">
<div class="cta">Learn More →</div>
<div class="nav-dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</div>
</body>
</html>
