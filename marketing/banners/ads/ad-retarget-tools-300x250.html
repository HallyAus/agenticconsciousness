<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Retarget Tools 300x250</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:300px;height:250px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.ad{width:300px;height:250px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ghost{position:absolute;right:-10px;bottom:-20px;font-weight:900;font-size:160px;color:rgba(255,61,0,0.04);pointer-events:none;line-height:1}
.header{padding:14px 18px;border-bottom:2px solid #ff3d00;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Space Mono',monospace;font-size:12px;color:#ff3d00}
.badge{font-family:'Space Mono',monospace;font-size:7px;color:#0a0a0a;background:#ff3d00;padding:3px 8px;text-transform:uppercase;letter-spacing:1px}
.content{flex:1;padding:16px 18px;display:flex;flex-direction:column;justify-content:center}
.headline{font-weight:900;font-size:20px;color:#fff;line-height:1.1;letter-spacing:-0.5px}
.red{color:#ff3d00}
.sub{font-weight:300;font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px;line-height:1.4}
.tools-row{display:flex;gap:2px;margin-top:10px}
.tool{flex:1;background:rgba(255,61,0,0.06);border-left:2px solid #ff3d00;padding:6px 8px}
.tool-name{font-family:'Space Mono',monospace;font-size:7px;color:rgba(255,255,255,0.6);text-transform:uppercase}
.cta-bar{border-top:2px solid #ff3d00;display:flex}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:11px;padding:12px;text-transform:uppercase;letter-spacing:1px;flex:1;text-align:center}
</style>
</head>
<body>
<div class="ad">
<div class="ghost">AC_</div>
<div class="header">
<div class="logo">AC_</div>
<div class="badge">Free</div>
</div>
<div class="content">
<div class="headline">Come Back &<br><span class="red">Try Our Tools</span></div>
<div class="sub">8+ free AI tools — no signup needed.</div>
<div class="tools-row">
<div class="tool"><div class="tool-name">AI Audit</div></div>
<div class="tool"><div class="tool-name">ROI Calc</div></div>
<div class="tool"><div class="tool-name">Prompts</div></div>
</div>
</div>
<div class="cta-bar">
<div class="cta">Try Free Tools →</div>
</div>
</div>
</body>
</html>
