<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Local Melbourne 1200x628</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:1200px;height:628px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.ad{width:1200px;height:628px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:grid;grid-template-rows:auto 1fr auto}
.ghost{position:absolute;right:-30px;top:100px;font-weight:900;font-size:400px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.ghost-city{position:absolute;left:50px;bottom:80px;font-weight:900;font-size:180px;color:rgba(255,255,255,0.02);pointer-events:none;text-transform:uppercase}
.header{padding:28px 50px;border-bottom:2px solid #ff3d00;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Space Mono',monospace;font-size:20px;color:#ff3d00}
.location{display:flex;align-items:center;gap:10px}
.loc-dot{width:8px;height:8px;background:#ff3d00}
.loc-text{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2px}
.hero{padding:40px 50px;display:flex;gap:40px;align-items:center}
.hero-content{flex:1}
.eyebrow{font-family:'Space Mono',monospace;font-size:12px;color:#ff3d00;text-transform:uppercase;letter-spacing:3px;margin-bottom:12px}
.headline{font-weight:900;font-size:52px;color:#fff;line-height:1;letter-spacing:-2px}
.red{color:#ff3d00}
.divider{width:60px;height:2px;background:#ff3d00;margin:20px 0}
.body{font-weight:300;font-size:16px;color:rgba(255,255,255,0.5);line-height:1.5;max-width:500px}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:14px;padding:16px 32px;text-transform:uppercase;letter-spacing:1px;display:inline-block;margin-top:20px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:320px}
.stat{background:rgba(255,61,0,0.05);border-left:2px solid #ff3d00;padding:18px 20px}
.stat-num{font-weight:900;font-size:32px;color:#ff3d00;line-height:1}
.stat-label{font-family:'Space Mono',monospace;font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.footer{padding:14px 50px;border-top:2px solid rgba(255,61,0,0.2);font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div class="ad">
<div class="ghost">AC_</div>
<div class="ghost-city">Melbourne</div>
<div class="header">
<div class="logo">AC_</div>
<div class="location">
<div class="loc-dot"></div>
<div class="loc-text">Melbourne, Australia</div>
</div>
</div>
<div class="hero">
<div class="hero-content">
<div class="eyebrow">AI Consulting Melbourne</div>
<div class="headline">Melbourne's<br>AI <span class="red">Edge</span></div>
<div class="divider"></div>
<div class="body">Melbourne businesses are moving to AI. We build production systems that integrate into your existing workflows.</div>
<div class="cta">Book Free Consult →</div>
</div>
<div class="stats">
<div class="stat"><div class="stat-num">21+</div><div class="stat-label">Years Exp</div></div>
<div class="stat"><div class="stat-num">8+</div><div class="stat-label">Free Tools</div></div>
<div class="stat"><div class="stat-num">AU</div><div class="stat-label">Owned</div></div>
<div class="stat"><div class="stat-num">∞</div><div class="stat-label">Scalable</div></div>
</div>
</div>
<div class="footer">agenticconsciousness.com.au</div>
</div>
</body>
</html>
