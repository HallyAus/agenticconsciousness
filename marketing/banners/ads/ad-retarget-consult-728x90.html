<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Retarget Consult 728x90</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:728px;height:90px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.ad{width:728px;height:90px;border:2px solid #ff3d00;display:flex;align-items:center;position:relative;overflow:hidden}
.ghost{position:absolute;right:120px;top:-10px;font-weight:900;font-size:80px;color:rgba(255,61,0,0.04);pointer-events:none}
.logo{font-family:'Space Mono',monospace;font-size:14px;color:#ff3d00;padding:0 20px;border-right:2px solid #ff3d00;height:100%;display:flex;align-items:center}
.content{flex:1;padding:0 20px}
.headline{font-weight:900;font-size:16px;color:#fff;line-height:1.1}
.red{color:#ff3d00}
.sub{font-weight:300;font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px}
.offer{padding:0 16px;border-left:2px solid rgba(255,61,0,0.2);border-right:2px solid rgba(255,61,0,0.2);height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center}
.offer-text{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px}
.offer-value{font-weight:900;font-size:22px;color:#ff3d00;line-height:1}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:11px;padding:0 24px;text-transform:uppercase;letter-spacing:1px;height:100%;display:flex;align-items:center;border-left:2px solid #ff3d00;white-space:nowrap}
</style>
</head>
<body>
<div class="ad">
<div class="ghost">AC_</div>
<div class="logo">AC_</div>
<div class="content">
<div class="headline">Still Thinking About <span class="red">AI?</span></div>
<div class="sub">Book a free 30-min consultation — no obligation.</div>
</div>
<div class="offer">
<div class="offer-text">Consult</div>
<div class="offer-value">Free</div>
</div>
<div class="cta">Book Now →</div>
</div>
</body>
</html>
