<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC_ Meta Feed 1080x1080</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
body{width:1080px;height:1080px;overflow:hidden;background:#0a0a0a;font-family:'Be Vietnam Pro',sans-serif}
.ad{width:1080px;height:1080px;border:2px solid #ff3d00;position:relative;overflow:hidden;display:flex;flex-direction:column}
.ghost{position:absolute;right:-40px;bottom:-80px;font-weight:900;font-size:600px;color:rgba(255,61,0,0.03);pointer-events:none;line-height:1}
.scan-line{position:absolute;top:0;left:0;right:0;height:100%;background:repeating-linear-gradient(transparent,transparent 4px,rgba(255,61,0,0.01) 4px,rgba(255,61,0,0.01) 5px);pointer-events:none}
.header{padding:40px 50px;border-bottom:2px solid #ff3d00;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Space Mono',monospace;font-size:28px;color:#ff3d00}
.badge{font-family:'Space Mono',monospace;font-size:10px;color:#0a0a0a;background:#ff3d00;padding:6px 14px;text-transform:uppercase;letter-spacing:2px}
.hero{flex:1;padding:50px;display:flex;flex-direction:column;justify-content:center}
.headline{font-weight:900;font-size:72px;color:#fff;line-height:0.95;letter-spacing:-3px}
.red{color:#ff3d00}
.divider{width:80px;height:3px;background:#ff3d00;margin:28px 0}
.body{font-weight:300;font-size:22px;color:rgba(255,255,255,0.5);line-height:1.5;max-width:700px}
.proof{display:flex;gap:2px;margin-top:30px}
.proof-item{background:rgba(255,61,0,0.06);border-left:2px solid #ff3d00;padding:16px 20px;flex:1}
.proof-num{font-weight:900;font-size:32px;color:#ff3d00;line-height:1}
.proof-label{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.footer{padding:30px 50px;border-top:2px solid #ff3d00;display:flex;justify-content:space-between;align-items:center}
.cta{background:#ff3d00;color:#0a0a0a;font-weight:900;font-size:18px;padding:18px 40px;text-transform:uppercase;letter-spacing:1px}
.url{font-family:'Space Mono',monospace;font-size:13px;color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<div class="ad">
<div class="ghost">AC_</div>
<div class="scan-line"></div>
<div class="header">
<div class="logo">AC_</div>
<div class="badge">AI Consulting</div>
</div>
<div class="hero">
<div class="headline">Stop Talking<br>About AI.<br><span class="red">Start Using It.</span></div>
<div class="divider"></div>
<div class="body">We build production AI systems for businesses that are ready to move. Free consultation. Real results.</div>
<div class="proof">
<div class="proof-item"><div class="proof-num">8+</div><div class="proof-label">Free AI Tools</div></div>
<div class="proof-item"><div class="proof-num">21yr</div><div class="proof-label">Experience</div></div>
<div class="proof-item"><div class="proof-num">AU</div><div class="proof-label">Owned</div></div>
</div>
</div>
<div class="footer">
<div class="cta">Book Free Consult →</div>
<div class="url">agenticconsciousness.com.au</div>
</div>
</div>
</body>
</html>
