<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Agentic Consciousness — CTA Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .slide {
    width: 1920px; height: 1080px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }
  .ghost-block-tl { position: absolute; top: 0; left: 0; width: 500px; height: 500px; background: rgba(255,61,0,0.06); }
  .ghost-block-br { position: absolute; bottom: 0; right: 0; width: 600px; height: 400px; background: rgba(255,61,0,0.06); }
  .ghost-grid { position: absolute; inset: 0; background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .red-line-top { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .red-line-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .logo-top { position: absolute; top: 60px; left: 80px; font-family: 'Space Mono', monospace; font-size: 36px; font-weight: 400; color: #ff3d00; z-index: 1; }
  .content { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 40px; }
  .heading { font-weight: 900; font-size: 96px; line-height: 1; letter-spacing: -4px; }
  .heading span { color: #ff3d00; }
  .divider { width: 120px; height: 3px; background: #ff3d00; }
  .subtitle { font-weight: 300; font-size: 24px; color: rgba(255,255,255,0.6); max-width: 700px; line-height: 1.5; }
  .contact-block { display: flex; gap: 48px; align-items: center; margin-top: 20px; }
  .contact-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .contact-label { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 3px; }
  .contact-value { font-weight: 900; font-size: 22px; }
  .contact-value.red { color: #ff3d00; }
  .contact-divider { width: 2px; height: 50px; background: rgba(255,255,255,0.1); }
  .founder { position: absolute; bottom: 60px; left: 80px; font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.25); z-index: 1; }
  .url-bottom { position: absolute; bottom: 60px; right: 80px; font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.25); z-index: 1; }
</style>
</head>
<body>
<div class="slide">
  <div class="ghost-block-tl"></div>
  <div class="ghost-block-br"></div>
  <div class="ghost-grid"></div>
  <div class="red-line-top"></div>
  <div class="red-line-bottom"></div>
  <div class="logo-top">AC_</div>
  <div class="content">
    <div class="heading">Let's <span>Talk.</span></div>
    <div class="divider"></div>
    <div class="subtitle">Ready to deploy AI that actually works? Book a free discovery call and find out what's possible.</div>
    <div class="contact-block">
      <div class="contact-item">
        <div class="contact-label">Email</div>
        <div class="contact-value red">ai@agenticconsciousness.com.au</div>
      </div>
      <div class="contact-divider"></div>
      <div class="contact-item">
        <div class="contact-label">Website</div>
        <div class="contact-value">agenticconsciousness.com.au</div>
      </div>
    </div>
  </div>
  <div class="founder">Daniel — Founder & AI Consultant — 21+ years experience</div>
  <div class="url-bottom">Intelligence. Deployed.</div>
</div>
</body>
</html>
