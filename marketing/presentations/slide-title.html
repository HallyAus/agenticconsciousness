<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Agentic Consciousness — Title Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .slide {
    width: 1920px; height: 1080px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }
  .ghost-block-tl { position: absolute; top: 0; left: 0; width: 600px; height: 400px; background: rgba(255,61,0,0.06); }
  .ghost-block-br { position: absolute; bottom: 0; right: 0; width: 400px; height: 300px; background: rgba(255,255,255,0.03); }
  .ghost-grid { position: absolute; inset: 0; background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 120px 120px;
  }
  .red-line-top { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .red-line-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .red-accent-left { position: absolute; top: 50%; left: 0; width: 6px; height: 200px; background: #ff3d00; transform: translateY(-50%); }
  .content { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 72px; font-weight: 400; color: #ff3d00; letter-spacing: -2px; }
  .title { font-weight: 900; font-size: 96px; line-height: 1; letter-spacing: -4px; }
  .divider { width: 120px; height: 3px; background: #ff3d00; }
  .tagline { font-weight: 300; font-size: 28px; color: rgba(255,255,255,0.6); letter-spacing: 4px; text-transform: uppercase; }
  .url { font-family: 'Space Mono', monospace; font-size: 16px; color: rgba(255,255,255,0.25); position: absolute; bottom: 60px; right: 80px; }
</style>
</head>
<body>
<div class="slide">
  <div class="ghost-block-tl"></div>
  <div class="ghost-block-br"></div>
  <div class="ghost-grid"></div>
  <div class="red-line-top"></div>
  <div class="red-line-bottom"></div>
  <div class="red-accent-left"></div>
  <div class="content">
    <div class="logo">AC_</div>
    <div class="title">Agentic<br>Consciousness</div>
    <div class="divider"></div>
    <div class="tagline">Intelligence. Deployed.</div>
  </div>
  <div class="url">agenticconsciousness.com.au</div>
</div>
</body>
</html>
