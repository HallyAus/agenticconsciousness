<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1080px;

.container { position: relative; z-index: 1; width: 100%; height: 100%; }

<div class="noise"></div>
<div class="container" style="display:flex; flex-direction:column; justify-content:center; padding:60px;">
  <div class="ghost" style="font-size:200px; bottom:-20px; left:-20px; line-height:1;">SIGNS</div>
  <div class="logo" style="font-size:24px; margin-bottom:24px;">AC_</div>
  <div class="label" style="margin-bottom:16px; color:#ff3d00;">// SLIDE 2 OF 3</div>
  <div style="display:flex; flex-direction:column; gap:16px;">
    <div style="display:flex; gap:16px; align-items:flex-start;"><div style="min-width:56px; height:56px; background:#ff3d00; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:24px; color:#0a0a0a;">01</div><div><div style="font-weight:900; font-size:20px;">Your team does repetitive tasks daily</div><div class="body-text" style="font-size:14px;">Reports, emails, data entry on repeat</div></div></div>
    <div style="display:flex; gap:16px; align-items:flex-start;"><div style="min-width:56px; height:56px; background:#ff3d00; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:24px; color:#0a0a0a;">02</div><div><div style="font-weight:900; font-size:20px;">Customer response times are slow</div><div class="body-text" style="font-size:14px;">Hours or days instead of minutes</div></div></div>
    <div style="display:flex; gap:16px; align-items:flex-start;"><div style="min-width:56px; height:56px; border:2px solid #ff3d00; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:24px; color:#ff3d00;">03</div><div><div style="font-weight:900; font-size:20px;">You&rsquo;re drowning in unstructured data</div><div class="body-text" style="font-size:14px;">Insights buried in PDFs and spreadsheets</div></div></div>

    <div style="width:32px; height:4px; background:rgba(255,255,255,0.2);"></div>
    <div style="width:32px; height:4px; background:#ff3d00;"></div>
    <div style="width:32px; height:4px; background:rgba(255,255,255,0.2);"></div>
  </div>
