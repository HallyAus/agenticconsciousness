<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Blog — Agentic Consciousness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0a0a0a;
  color: #ffffff;
  font-family: 'Be Vietnam Pro', sans-serif;
  position: relative;
}
.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.container { position: relative; z-index: 1; width: 100%; height: 100%; }
.ghost { position: absolute; opacity: 0.06; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; pointer-events: none; z-index: 0; }
.logo { font-family: 'Space Mono', monospace; font-weight: 700; color: #ff3d00; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: rgba(255,255,255,0.5); }
.headline { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; line-height: 1.05; color: #ffffff; }
.body-text { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; line-height: 1.5; color: rgba(255,255,255,0.7); }
.red { color: #ff3d00; }
.red-bg { background: #ff3d00; color: #0a0a0a; }
.border-red { border: 2px solid #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container" style="display:flex;">
  <div style="width:60%; display:flex; flex-direction:column; justify-content:center; padding:60px;">
    <div class="ghost" style="font-size:200px; top:-20px; left:-20px; line-height:1;">BLOG</div>
    <div class="label" style="margin-bottom:12px; color:#ff3d00;">// FROM THE BLOG</div>
    <div class="headline" style="font-size:40px; margin-bottom:16px; line-height:1.1;">[Your Blog Title Goes Here — Replace This Text]</div>
    <div class="body-text" style="font-size:16px; margin-bottom:24px; max-width:450px;">[Subtitle or excerpt text goes here. Keep it to 2 lines maximum.]</div>
    <div style="display:flex; align-items:center; gap:16px;">
      <div class="red-bg" style="padding:10px 24px; font-weight:700; font-size:14px;">READ MORE →</div>
    </div>
  </div>
  <div style="width:40%; background:rgba(255,61,0,0.08); display:flex; align-items:center; justify-content:center; border-left:2px solid #ff3d00;">
    <div class="logo" style="font-size:80px; opacity:0.3;">AC_</div>
  </div>
  <div class="url" style="position:absolute; bottom:24px; left:60px;">agenticconsciousness.com.au/blog</div>
</div>
</body>
</html>
