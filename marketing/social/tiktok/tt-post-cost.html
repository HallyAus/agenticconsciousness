<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT Cost — Agentic Consciousness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: #0a0a0a;
  color: #ffffff;
  font-family: 'Be Vietnam Pro', sans-serif;
  position: relative;
}
.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.container { position: relative; z-index: 1; width: 100%; height: 100%; }
.ghost { position: absolute; opacity: 0.06; font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; pointer-events: none; z-index: 0; }
.logo { font-family: 'Space Mono', monospace; font-weight: 700; color: #ff3d00; }
.label { font-family: 'Space Mono', monospace; font-weight: 400; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: rgba(255,255,255,0.5); }
.headline { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 900; line-height: 1.05; color: #ffffff; }
.body-text { font-family: 'Be Vietnam Pro', sans-serif; font-weight: 300; line-height: 1.5; color: rgba(255,255,255,0.7); }
.red { color: #ff3d00; }
.red-bg { background: #ff3d00; color: #0a0a0a; }
.border-red { border: 2px solid #ff3d00; }
.url { font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:80px 60px;">
  <div class="ghost" style="font-size:300px; top:400px; left:50%; transform:translateX(-50%); line-height:1;">COST</div>
  <div class="logo" style="font-size:32px; position:absolute; top:60px;">AC_</div>
  <div class="label" style="margin-bottom:24px;">// THE REAL QUESTION</div>
  <div class="headline" style="font-size:52px; margin-bottom:48px;">The real cost<br>of <span style="text-decoration:line-through; opacity:0.3;">using</span><br><span class="red">not using</span> AI</div>
  <div style="display:flex; flex-direction:column; gap:24px; width:100%; max-width:600px;">
    <div style="border:2px solid rgba(255,255,255,0.1); padding:24px;"><div style="font-weight:900; font-size:36px; color:#ff3d00;">$47K</div><div class="body-text" style="margin-top:4px;">avg annual cost of manual report generation</div></div>
    <div style="border:2px solid rgba(255,255,255,0.1); padding:24px;"><div style="font-weight:900; font-size:36px; color:#ff3d00;">1,200 hrs</div><div class="body-text" style="margin-top:4px;">wasted on tasks AI handles in seconds</div></div>
    <div style="border:2px solid rgba(255,255,255,0.1); padding:24px;"><div style="font-weight:900; font-size:36px; color:#ff3d00;">23%</div><div class="body-text" style="margin-top:4px;">of customers lost to slow response times</div></div>
  </div>
  <div class="body-text" style="font-size:18px; margin-top:32px;">Can you afford to wait?</div>
  <div class="url" style="position:absolute; bottom:80px;">@agenticconsciousness</div>
</div>
</body>
</html>
