<style>

<div class="noise"></div>
<div class="container" style="display:flex; flex-direction:column; padding:80px 60px;">

  <div style="background:#ff3d00; padding:12px 24px; display:inline-block; margin-bottom:32px; align-self:flex-start;"><span style="font-family:'Space Mono',monospace; font-weight:700; color:#0a0a0a; font-size:16px;">AI TIP #1</span></div>
  <div class="headline" style="font-size:56px; margin-bottom:32px; flex:0;">Start with your<br>biggest<br><span class="red">bottleneck</span></div>

  </div>
