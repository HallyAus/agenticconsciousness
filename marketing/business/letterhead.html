<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2480">
<title>Agentic Consciousness — Letterhead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .page {
    width: 2480px; height: 3508px; background: #f0ede6; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #0a0a0a;
  }
  .header { padding: 120px 160px 0; display: flex; justify-content: space-between; align-items: flex-start; }
  .logo { font-family: 'Space Mono', monospace; font-size: 72px; font-weight: 400; color: #ff3d00; letter-spacing: -2px; }
  .company-name { font-weight: 900; font-size: 28px; letter-spacing: 3px; text-transform: uppercase; color: #0a0a0a; text-align: right; }
  .red-line { margin: 40px 160px 0; height: 3px; background: #ff3d00; }
  .ghost-sidebar { position: absolute; top: 0; right: 0; width: 120px; height: 100%; background: rgba(255,61,0,0.06); }
  .ghost-dots { position: absolute; top: 300px; left: 160px; display: flex; gap: 12px; }
  .ghost-dot { width: 8px; height: 8px; background: rgba(10,10,10,0.06); }
  .content-area { padding: 160px; flex: 1; }
  .footer {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 60px 160px;
    border-top: 2px solid rgba(10,10,10,0.1); display: flex; justify-content: space-between; align-items: center;
  }
  .footer-left { display: flex; gap: 40px; }
  .footer-item { font-family: 'Space Mono', monospace; font-size: 18px; color: rgba(10,10,10,0.5); }
  .footer-label { font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(10,10,10,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .footer-right { text-align: right; }
  .footer-logo { font-family: 'Space Mono', monospace; font-size: 32px; color: rgba(255,61,0,0.3); }
</style>
</head>
<body>
<div class="page">
  <div class="ghost-sidebar"></div>
  <div class="header">
    <div class="logo">AC_</div>
    <div class="company-name">Agentic<br>Consciousness</div>
  </div>
  <div class="red-line"></div>
  <div class="ghost-dots">
    <div class="ghost-dot"></div>
    <div class="ghost-dot"></div>
    <div class="ghost-dot"></div>
  </div>
  <div class="content-area"></div>
  <div class="footer">
    <div class="footer-left">
      <div>
        <div class="footer-label">Email</div>
        <div class="footer-item">ai@agenticconsciousness.com.au</div>
      </div>
      <div>
        <div class="footer-label">Web</div>
        <div class="footer-item">agenticconsciousness.com.au</div>
      </div>
    </div>
    <div class="footer-right">
      <div class="footer-logo">AC_</div>
    </div>
  </div>
</div>
</body>
</html>
