<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Agentic Consciousness — Capabilities Deck Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .slide {
    width: 1920px; height: 1080px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center;
  }
  .ghost-stripe-1 { position: absolute; top: 0; left: 0; width: 100%; height: 200px; background: rgba(255,61,0,0.06); }
  .ghost-stripe-2 { position: absolute; bottom: 0; left: 0; width: 100%; height: 120px; background: rgba(255,255,255,0.03); }
  .ghost-vertical { position: absolute; top: 0; right: 400px; width: 1px; height: 100%; background: rgba(255,255,255,0.06); }
  .red-line-top { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .red-line-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .content { position: relative; z-index: 1; padding: 100px 160px; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .logo { font-family: 'Space Mono', monospace; font-size: 64px; font-weight: 400; color: #ff3d00; letter-spacing: -2px; }
  .year { font-family: 'Space Mono', monospace; font-size: 16px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
  .center { display: flex; flex-direction: column; gap: 24px; }
  .doc-label { font-family: 'Space Mono', monospace; font-size: 13px; color: #ff3d00; text-transform: uppercase; letter-spacing: 4px; }
  .title { font-weight: 900; font-size: 80px; line-height: 1; letter-spacing: -3px; }
  .subtitle { font-weight: 300; font-size: 24px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
  .divider { width: 120px; height: 3px; background: #ff3d00; }
  .bottom-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .author { font-weight: 300; font-size: 16px; color: rgba(255,255,255,0.5); }
  .author strong { font-weight: 900; color: #ffffff; }
  .url { font-family: 'Space Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="slide">
  <div class="ghost-stripe-1"></div>
  <div class="ghost-stripe-2"></div>
  <div class="ghost-vertical"></div>
  <div class="red-line-top"></div>
  <div class="red-line-bottom"></div>
  <div class="content">
    <div class="top-row">
      <div class="logo">AC_</div>
      <div class="year">2026</div>
    </div>
    <div class="center">
      <div class="doc-label">Capabilities</div>
      <div class="title">What We<br>Can Do</div>
      <div class="divider"></div>
      <div class="subtitle">AI strategy, development, and deployment for forward-thinking businesses</div>
    </div>
    <div class="bottom-row">
      <div class="author"><strong>Agentic Consciousness</strong> — Founded by Daniel</div>
      <div class="url">agenticconsciousness.com.au</div>
    </div>
  </div>
</div>
</body>
</html>
