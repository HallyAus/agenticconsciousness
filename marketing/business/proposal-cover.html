<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Agentic Consciousness — Proposal Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .slide {
    width: 1920px; height: 1080px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
  }
  .ghost-grid { position: absolute; inset: 0; background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .ghost-block { position: absolute; top: 0; right: 0; width: 500px; height: 100%; background: rgba(255,61,0,0.06); }
  .red-line-left { position: absolute; top: 0; left: 120px; width: 3px; height: 100%; background: #ff3d00; }
  .content { position: relative; z-index: 1; padding: 100px 160px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .logo { font-family: 'Space Mono', monospace; font-size: 56px; font-weight: 400; color: #ff3d00; letter-spacing: -2px; }
  .date-label { font-family: 'Space Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }
  .middle { padding-left: 40px; }
  .doc-type { font-family: 'Space Mono', monospace; font-size: 14px; color: #ff3d00; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 24px; }
  .title { font-weight: 900; font-size: 72px; line-height: 1.05; letter-spacing: -2px; max-width: 900px; }
  .client-block { margin-top: 48px; padding: 32px; border: 2px solid rgba(255,255,255,0.1); display: inline-block; }
  .client-label { font-family: 'Space Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .client-name { font-weight: 900; font-size: 28px; color: #ffffff; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; padding-left: 40px; }
  .prepared-by { font-weight: 300; font-size: 16px; color: rgba(255,255,255,0.5); }
  .prepared-by strong { font-weight: 900; color: #ffffff; }
  .url { font-family: 'Space Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="slide">
  <div class="ghost-grid"></div>
  <div class="ghost-block"></div>
  <div class="red-line-left"></div>
  <div class="content">
    <div class="top">
      <div class="logo">AC_</div>
      <div class="date-label">[Date]</div>
    </div>
    <div class="middle">
      <div class="doc-type">Proposal</div>
      <div class="title">AI Consulting<br>Proposal</div>
      <div class="client-block">
        <div class="client-label">Prepared for</div>
        <div class="client-name">[Client Name]</div>
      </div>
    </div>
    <div class="bottom">
      <div class="prepared-by">Prepared by <strong>Daniel</strong> — Founder & AI Consultant</div>
      <div class="url">agenticconsciousness.com.au</div>
    </div>
  </div>
</div>
</body>
</html>
