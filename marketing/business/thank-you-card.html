<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Agentic Consciousness — Thank You Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1080px; height: 1080px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }
  .ghost-corner { position: absolute; top: 0; right: 0; width: 400px; height: 400px; background: rgba(255,61,0,0.06); }
  .ghost-corner-bl { position: absolute; bottom: 0; left: 0; width: 300px; height: 300px; background: rgba(255,255,255,0.03); }
  .border-frame { position: absolute; inset: 40px; border: 2px solid rgba(255,255,255,0.06); }
  .red-accent-top { position: absolute; top: 40px; left: 40px; width: 120px; height: 3px; background: #ff3d00; }
  .red-accent-bottom { position: absolute; bottom: 40px; right: 40px; width: 120px; height: 3px; background: #ff3d00; }
  .content { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 80px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 56px; font-weight: 400; color: #ff3d00; letter-spacing: -2px; }
  .thanks { font-weight: 900; font-size: 52px; line-height: 1.1; letter-spacing: -1px; }
  .divider { width: 80px; height: 3px; background: #ff3d00; }
  .message { font-weight: 300; font-size: 20px; color: rgba(255,255,255,0.7); line-height: 1.6; max-width: 600px; }
  .url { font-family: 'Space Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.3); margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="ghost-corner"></div>
  <div class="ghost-corner-bl"></div>
  <div class="border-frame"></div>
  <div class="red-accent-top"></div>
  <div class="red-accent-bottom"></div>
  <div class="content">
    <div class="logo">AC_</div>
    <div class="thanks">Thanks for<br>Choosing<br>Agentic<br>Consciousness</div>
    <div class="divider"></div>
    <div class="message">We're excited to work with you. Your AI transformation starts now.</div>
    <div class="url">agenticconsciousness.com.au</div>
  </div>
</div>
</body>
</html>
