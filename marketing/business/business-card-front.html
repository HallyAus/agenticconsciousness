<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1050">
<title>Agentic Consciousness — Business Card Front</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1050px; height: 600px; background: #0a0a0a; position: relative; overflow: hidden;
    border: 2px solid #ff3d00; font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
  }
  .ghost-block { position: absolute; top: 0; right: 0; width: 320px; height: 100%; background: rgba(255,61,0,0.06); }
  .ghost-line { position: absolute; bottom: 80px; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.06); }
  .content { position: relative; z-index: 1; padding: 60px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .logo { font-family: 'Space Mono', monospace; font-size: 42px; font-weight: 400; color: #ff3d00; letter-spacing: -1px; }
  .info { display: flex; flex-direction: column; gap: 8px; }
  .name { font-weight: 900; font-size: 36px; letter-spacing: -0.5px; line-height: 1; }
  .title { font-weight: 300; font-size: 16px; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }
  .contact { display: flex; flex-direction: column; gap: 6px; }
  .contact-item { font-family: 'Space Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }
  .red-bar { position: absolute; left: 0; top: 50%; width: 4px; height: 80px; background: #ff3d00; transform: translateY(-50%); }
</style>
</head>
<body>
<div class="card">
  <div class="ghost-block"></div>
  <div class="ghost-line"></div>
  <div class="red-bar"></div>
  <div class="content">
    <div class="logo">AC_</div>
    <div class="info">
      <div class="name">Daniel</div>
      <div class="title">Founder & AI Consultant</div>
    </div>
    <div class="contact">
      <div class="contact-item">ai@agenticconsciousness.com.au</div>
      <div class="contact-item">agenticconsciousness.com.au</div>
    </div>
  </div>
</div>
</body>
</html>
