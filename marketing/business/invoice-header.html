<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2480">
<title>Agentic Consciousness — Invoice Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .strip {
    width: 2480px; height: 400px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; justify-content: space-between; padding: 0 120px;
  }
  .ghost-block { position: absolute; top: 0; left: 50%; width: 400px; height: 100%; background: rgba(255,61,0,0.06); }
  .ghost-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.06); }
  .red-accent { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #ff3d00; }
  .left { position: relative; z-index: 1; display: flex; align-items: center; gap: 40px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 72px; font-weight: 400; color: #ff3d00; letter-spacing: -2px; }
  .brand-name { font-weight: 900; font-size: 32px; letter-spacing: 2px; text-transform: uppercase; }
  .right { position: relative; z-index: 1; text-align: right; }
  .invoice-label { font-family: 'Space Mono', monospace; font-size: 48px; font-weight: 400; color: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 8px; }
  .contact-row { display: flex; gap: 40px; margin-top: 12px; }
  .contact-item { font-family: 'Space Mono', monospace; font-size: 14px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="strip">
  <div class="ghost-block"></div>
  <div class="ghost-line-h"></div>
  <div class="red-accent"></div>
  <div class="left">
    <div class="logo">AC_</div>
    <div>
      <div class="brand-name">Agentic Consciousness</div>
      <div class="contact-row">
        <div class="contact-item">ai@agenticconsciousness.com.au</div>
        <div class="contact-item">agenticconsciousness.com.au</div>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="invoice-label">Invoice</div>
  </div>
</div>
</body>
</html>
