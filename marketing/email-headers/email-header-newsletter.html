<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>Agentic Consciousness — Newsletter Email Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .header {
    width: 600px; height: 200px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
  }
  .ghost-grid { position: absolute; inset: 0; background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .red-top { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #ff3d00; }
  .content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 400; color: #ff3d00; }
  .divider-v { width: 2px; height: 40px; background: rgba(255,255,255,0.1); }
  .title { font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
  .right { text-align: right; }
  .issue { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }
  .date { font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; }
</style>
</head>
<body>
<div class="header">
  <div class="ghost-grid"></div>
  <div class="red-top"></div>
  <div class="content">
    <div class="left">
      <div class="logo">AC_</div>
      <div class="divider-v"></div>
      <div class="title">The Intelligence<br>Dispatch</div>
    </div>
    <div class="right">
      <div class="issue">Newsletter</div>
      <div class="date">[Month Year]</div>
    </div>
  </div>
</div>
</body>
</html>
