<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>Agentic Consciousness — New Tool Email Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .header {
    width: 600px; height: 200px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; padding: 0 40px;
  }
  .ghost-block { position: absolute; top: 0; left: 0; width: 160px; height: 100%; background: rgba(255,61,0,0.06); }
  .red-left { position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: #ff3d00; }
  .red-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #ff3d00; }
  .content { position: relative; z-index: 1; display: flex; align-items: center; gap: 20px; width: 100%; }
  .logo { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 400; color: #ff3d00; }
  .text { display: flex; flex-direction: column; gap: 4px; }
  .badge { font-family: 'Space Mono', monospace; font-size: 9px; color: #0a0a0a; background: #ff3d00; padding: 3px 8px; text-transform: uppercase; letter-spacing: 2px; display: inline-block; width: fit-content; }
  .title { font-weight: 900; font-size: 22px; letter-spacing: -0.5px; margin-top: 4px; }
  .subtitle { font-weight: 300; font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="header">
  <div class="ghost-block"></div>
  <div class="red-left"></div>
  <div class="red-bottom"></div>
  <div class="content">
    <div class="logo">AC_</div>
    <div class="text">
      <div class="badge">New Tool</div>
      <div class="title">[Tool Name]</div>
      <div class="subtitle">Try it free at agenticconsciousness.com.au</div>
    </div>
  </div>
</div>
</body>
</html>
