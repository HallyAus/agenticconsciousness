<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>Agentic Consciousness — Follow-Up Email Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .header {
    width: 600px; height: 200px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; padding: 0 40px;
  }
  .ghost-stripe { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.03); }
  .ghost-block { position: absolute; top: 0; right: 80px; width: 1px; height: 100%; background: rgba(255,61,0,0.06); }
  .red-top { position: absolute; top: 0; left: 0; width: 200px; height: 3px; background: #ff3d00; }
  .content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 400; color: #ff3d00; }
  .title { font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
  .subtitle { font-weight: 300; font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .right { font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3); text-align: right; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="header">
  <div class="ghost-stripe"></div>
  <div class="ghost-block"></div>
  <div class="red-top"></div>
  <div class="content">
    <div class="left">
      <div class="logo">AC_</div>
      <div>
        <div class="title">Just Checking In</div>
        <div class="subtitle">We'd love to hear how things are going</div>
      </div>
    </div>
    <div class="right">agenticconsciousness<br>.com.au</div>
  </div>
</div>
</body>
</html>
