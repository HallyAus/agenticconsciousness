<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>Agentic Consciousness — Welcome Email Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  body { background: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .header {
    width: 600px; height: 200px; background: #0a0a0a; position: relative; overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif; color: #ffffff;
    display: flex; align-items: center; padding: 0 40px;
  }
  .ghost-block { position: absolute; top: 0; right: 0; width: 200px; height: 100%; background: rgba(255,61,0,0.06); }
  .ghost-line { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.06); }
  .red-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #ff3d00; }
  .content { position: relative; z-index: 1; display: flex; align-items: center; gap: 24px; width: 100%; justify-content: space-between; }
  .left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 400; color: #ff3d00; }
  .text { display: flex; flex-direction: column; gap: 4px; }
  .label { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; }
  .title { font-weight: 900; font-size: 22px; letter-spacing: -0.5px; }
</style>
</head>
<body>
<div class="header">
  <div class="ghost-block"></div>
  <div class="ghost-line"></div>
  <div class="red-bottom"></div>
  <div class="content">
    <div class="left">
      <div class="logo">AC_</div>
      <div class="text">
        <div class="label">Welcome to</div>
        <div class="title">Agentic Consciousness</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
